version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rig_postgres
    environment:
      POSTGRES_USER: rig_user
      POSTGRES_PASSWORD: rig_pass
      POSTGRES_DB: rig_financeiro
    ports:
      - "15432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rig_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@performa.com.br
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
